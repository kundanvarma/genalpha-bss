{{- range $name, $svc := .Values.services }}
{{- if ne $svc.enabled false }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: genalpha-bss
spec:
  # per-service override first (the P0 tick locks make >1 safe), then the
  # chart-wide default
  replicas: {{ $svc.replicas | default $.Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/part-of: genalpha-bss
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.image.prefix }}{{ $name }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            {{- if $svc.db }}
            - name: DB_URL
              value: "jdbc:postgresql://{{ $.Values.config.dbHost }}:{{ $.Values.config.dbPort }}/{{ $svc.db }}"
            - name: DB_USERNAME
              value: {{ $svc.dbRole | default $.Values.config.dbUsername | quote }}
            - name: DB_PASSWORD
              value: {{ $svc.dbPassword | default $svc.dbRole | default $.Values.config.dbPassword | quote }}
            - name: DB_MIGRATION_USERNAME
              value: {{ $.Values.config.dbMigrationUsername | quote }}
            - name: DB_MIGRATION_PASSWORD
              value: {{ $.Values.config.dbMigrationPassword | quote }}
            - name: OIDC_ISSUER_URI
              value: {{ $.Values.config.oidcIssuerUri | quote }}
            {{- if $.Values.config.oidcJwksUri }}
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: {{ $.Values.config.oidcJwksUri | quote }}
            {{- end }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ $.Values.config.kafkaBootstrapServers | quote }}
            - name: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
              value: "5"
            # idle pools shrink to one connection — managed Postgres
            # tiers meter connections; a fleet must not hold 5x13 slots
            # while idle (learned live on Azure B1ms's ~50-slot cap)
            - name: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
              value: "1"
            {{- end }}
            {{- if and (eq $name "service-orchestration") $.Values.pukKey }}
            - name: BSS_SIM_PUK_KEY
              value: {{ $.Values.pukKey | quote }}
            {{- end }}
            {{- if $.Values.config.novaIssuerUri }}
            - name: OIDC_ISSUER_URI_NOVA
              value: {{ $.Values.config.novaIssuerUri | quote }}
            - name: OIDC_JWKS_URI_NOVA
              value: {{ $.Values.config.novaJwksUri | quote }}
            {{- end }}
            {{- if $svc.machineIdentity }}
            - name: OIDC_TOKEN_URI
              value: {{ $.Values.config.oidcTokenUri | quote }}
            {{- if $.Values.config.novaTokenUri }}
            - name: OIDC_TOKEN_URI_NOVA
              value: {{ $.Values.config.novaTokenUri | quote }}
            {{- end }}
            {{- end }}
            {{- range $k, $v := $svc.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ $svc.healthPath | default "/actuator/health" }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: {{ $svc.healthPath | default "/actuator/health" }}
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: genalpha-bss
spec:
  selector:
    app.kubernetes.io/name: {{ $name }}
  ports:
    - name: http
      port: 8080
      targetPort: http
{{- end }}
{{- end }}
