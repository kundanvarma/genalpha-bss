{{- if .Values.local.keycloak.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
data:
  bss-realm.json: |
{{ .Files.Get "files/bss-realm.json" | indent 4 }}
  nova-realm.json: |
{{ .Files.Get "files/nova-realm.json" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: genalpha-bss
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/part-of: genalpha-bss
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0
          args: ["start-dev", "--import-realm"]
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: admin
            # Frontend URLs (and the token issuer) pin to the port-forward
            # address browsers use; backchannel stays on the cluster DNS name.
            - name: KC_HOSTNAME
              value: {{ .Values.local.keycloak.frontendUrl | quote }}
            - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
              value: "true"
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
          readinessProbe:
            httpGet:
              path: /realms/bss
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: realm
          configMap:
            name: keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  selector:
    app.kubernetes.io/name: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: http
{{- end }}
