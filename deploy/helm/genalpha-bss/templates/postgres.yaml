{{- if .Values.local.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
data:
  10-init-databases.sql: |
{{ .Files.Get "files/init-databases.sql" | indent 4 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.local.postgres.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: genalpha-bss
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: genalpha-bss
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          args: ["-c", "max_connections=300"]
          env:
            - name: POSTGRES_USER
              value: {{ .Values.config.dbUsername | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.config.dbPassword | quote }}
            - name: POSTGRES_DB
              value: postgres
          ports:
            - name: pg
              containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.config.dbUsername | quote }}]
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: pg
      port: 5432
      targetPort: pg
{{- end }}
