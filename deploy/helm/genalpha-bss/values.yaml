# Image source. The default expects images built locally by docker compose
# (repository prefix "bss-java-"). For a registry deployment set e.g.
#   image.prefix: ghcr.io/kundanvarma/genalpha-bss/
image:
  prefix: bss-java-
  tag: latest
  pullPolicy: IfNotPresent

replicas: 1

# Cross-cutting endpoints. Defaults target the in-cluster dependencies below;
# on EKS/AKS point these at RDS / Azure Database / MSK / Event Hubs / your IdP.
config:
  oidcIssuerUri: http://localhost:8085/realms/bss
  # Backchannel JWKS fetch; set empty when the issuer is directly reachable
  # from the pods (e.g. a real cloud IdP) to fall back to issuer discovery.
  oidcJwksUri: http://keycloak:8080/realms/bss/protocol/openid-connect/certs
  oidcTokenUri: http://keycloak:8080/realms/bss/protocol/openid-connect/token
  kafkaBootstrapServers: kafka:9092
  dbHost: postgres
  dbPort: "5432"
  dbUsername: postgres
  # Local/dev only. In cloud, use an existingSecret instead.
  dbPassword: postgres
  # Owner credentials for Flyway; the runtime uses each service's RLS-
  # restricted dbRole (dev convention: password == role name — override
  # per environment).
  dbMigrationUsername: postgres
  dbMigrationPassword: postgres
  # Second demo tenant (Nova Telecom). Remove or extend per deployment.
  novaIssuerUri: http://localhost:8085/realms/nova
  novaJwksUri: http://keycloak:8080/realms/nova/protocol/openid-connect/certs
  novaTokenUri: http://keycloak:8080/realms/nova/protocol/openid-connect/token

# In-cluster dependencies for local/dev clusters. Disable each on cloud.
local:
  postgres:
    enabled: true
    storage: 1Gi
  kafka:
    enabled: true
  keycloak:
    enabled: true
    frontendUrl: http://localhost:8085

resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    memory: 768Mi

# All application services and channel UIs — the ODA module list. Each entry
# may set `enabled: false` to leave that component out of the deployment
# (default: deployed); docs/composer.html generates override files with the
# dependency rules applied. `db` names the per-service database (empty for
# stateless apps); `machineIdentity: true` injects the client-credentials
# token endpoint; `extraEnv` is appended verbatim.
#
# Dependency matrix (enforced by the composer, honored by Noop fallbacks):
#   core (always):        gateway, product-catalog, product-ordering,
#                         product-inventory, party-account
#   billing        needs  payment, usage? (no — usage optional), catalog, inventory
#   promotion      needs  product-ordering (+ billing for bill discounts)
#   campaign       needs  communication (delivery) + promotion (reward codes)
#   intelligence   standalone (LLM seam; stub provider by default, any model via env)
#   agreement      needs  product-ordering
#   payment-method needs  payment
#   appointment    needs  qualification (install slots exist for gated offers)
#   channels (storefront/csr-console/console) work against whatever is deployed;
#   optional features hide when their component is absent.
services:
  gateway:
    db: ""
    extraEnv:
      CATALOG_URL: http://product-catalog:8080
      ORDERING_URL: http://product-ordering:8080
      INVENTORY_URL: http://product-inventory:8080
      PARTY_URL: http://party-account:8080
      STOCK_URL: http://product-stock:8080
      PAYMENT_URL: http://payment:8080
      BILLING_URL: http://billing:8080
      QUALIFICATION_URL: http://qualification:8080
      APPOINTMENT_URL: http://appointment:8080
      TICKET_URL: http://trouble-ticket:8080
      INTERACTION_URL: http://party-interaction:8080
      COMMUNICATION_URL: http://communication:8080
      CART_URL: http://shopping-cart:8080
      USAGE_URL: http://usage:8080
      AGREEMENT_URL: http://agreement:8080
      PROMOTION_URL: http://promotion:8080
      CAMPAIGN_URL: http://campaign:8080
      INTELLIGENCE_URL: http://intelligence:8080
      QUOTE_URL: http://quote:8080
      PORTING_URL: http://porting:8080
      POLICY_URL: http://policy:8080
      KNOWLEDGE_URL: http://knowledge:8080
      INSIGHT_URL: http://insight:8080
      FLOW_URL: http://flow:8080
      USER_ROLES_URL: http://user-roles:8080
      ADDRESS_URL: http://geographic-address:8080
      DOCUMENT_URL: http://document:8080
      RECOMMENDATION_URL: http://recommendation:8080
      PAYMENT_METHOD_URL: http://payment-method:8080
      SOM_URL: http://service-orchestration:8080
      ASSURANCE_URL: http://assurance:8080
      CONSOLE_URL: http://console:8080
      STOREFRONT_URL: http://storefront:8080
      APP_URL: http://mobile-app:8080
      PIM_URL: http://mock-pim:8080
      CSR_URL: http://csr-console:8080
  console:
    db: ""
    healthPath: /healthz
    extraEnv: {}
  storefront:
    db: ""
    healthPath: /healthz
    extraEnv: {}
  csr-console:
    db: ""
    healthPath: /healthz
    extraEnv: {}
  mobile-app:
    db: ""
    healthPath: /healthz
    extraEnv: {}
  # demo stand-in for an operator's external PIM (bring-your-own-PIM seam)
  mock-pim:
    db: ""
    healthPath: /health
    extraEnv: {}
  # demo stand-in for the operator's Online Charging System (OCS seam)
  mock-ocs:
    db: ""
    healthPath: /health
    extraEnv: {}
  # demo stand-in for the operator's web analytics (GA4 seam)
  mock-analytics:
    db: ""
    healthPath: /health
    extraEnv: {}
  # demo stand-in for the operator's email provider (ESP seam, SendGrid v3)
  mock-esp:
    db: ""
    healthPath: /health
    extraEnv:
      WEBHOOK_URL: http://communication:8080/esp/v1/event
  product-catalog:
    db: product_catalog
    dbRole: catalog_app
    extraEnv:
      # nova brings its own PIM; genalpha uses the internal document store
      PIM_BASE_URL_NOVA: http://mock-pim:8080
  product-ordering:
    db: product_ordering
    dbRole: ordering_app
    machineIdentity: true
    extraEnv:
      CATALOG_BASE_URL: http://product-catalog:8080
      PARTY_BASE_URL: http://party-account:8080
      INVENTORY_BASE_URL: http://product-inventory:8080
      STOCK_BASE_URL: http://product-stock:8080
      PAYMENT_BASE_URL: http://payment:8080
      AGREEMENT_BASE_URL: http://agreement:8080
      PROMOTION_BASE_URL: http://promotion:8080
      POLICY_BASE_URL: http://policy:8080
  product-inventory:
    db: product_inventory
    dbRole: inventory_app
    # the family hub: inventory verifies household links at the party source
    machineIdentity: true
    extraEnv:
      PARTY_BASE_URL: http://party-account:8080
  party-account:
    db: party_account
    dbRole: party_app
    extraEnv: {}
  product-stock:
    db: product_stock
    dbRole: stock_app
    extraEnv: {}
  payment:
    db: payment
    dbRole: payment_app
    machineIdentity: true
    extraEnv:
      PAYMENT_PSP: mock
      OIDC_CLIENT_ID: bss-payment
      OIDC_CLIENT_SECRET: payment-secret
      PAYMENT_METHOD_BASE_URL: http://payment-method:8080
  billing:
    db: billing
    dbRole: billing_app
    machineIdentity: true
    extraEnv:
      OIDC_CLIENT_ID: bss-billing
      OIDC_CLIENT_SECRET: billing-secret
      INVENTORY_BASE_URL: http://product-inventory:8080
      CATALOG_BASE_URL: http://product-catalog:8080
      PAYMENT_BASE_URL: http://payment:8080
      USAGE_BASE_URL: http://usage:8080
      PROMOTION_BASE_URL: http://promotion:8080
  qualification:
    db: qualification
    dbRole: qualification_app
    extraEnv: {}
  appointment:
    db: appointment
    dbRole: appointment_app
    extraEnv: {}
  trouble-ticket:
    db: trouble_ticket
    dbRole: ticket_app
    extraEnv: {}
  party-interaction:
    db: party_interaction
    dbRole: interaction_app
    extraEnv: {}
  communication:
    db: communication
    dbRole: communication_app
    # ESP delivery seam: per-tenant email provider (SendGrid v3 wire shape);
    # party lookup for the recipient address needs machine identity
    machineIdentity: true
    extraEnv:
      OIDC_CLIENT_ID: bss-communication
      OIDC_CLIENT_SECRET: communication-secret
      PARTY_BASE_URL: http://party-account:8080
      DELIVERY_PROVIDER_NOVA: esp
      ESP_URL_NOVA: http://mock-esp:8080
      ESP_API_KEY_NOVA: nova-esp-key
      ESP_FROM_NOVA: no-reply@nova.example
  shopping-cart:
    db: shopping_cart
    dbRole: cart_app
    extraEnv: {}
  usage:
    db: usage
    dbRole: usage_app
    # gifting verifies household links at the party source; the plan's spec
    # characteristics and the gifting policy rules configure the behavior
    machineIdentity: true
    extraEnv:
      OCS_BASE_URL: http://mock-ocs:8080
      PARTY_BASE_URL: http://party-account:8080
      CATALOG_BASE_URL: http://product-catalog:8080
      POLICY_BASE_URL: http://policy:8080
  agreement:
    db: agreement
    dbRole: agreement_app
    extraEnv: {}
  promotion:
    db: promotion
    dbRole: promotion_app
    extraEnv: {}
  campaign:
    db: campaign
    dbRole: campaign_app
    machineIdentity: true
    extraEnv:
      OIDC_CLIENT_ID: bss-campaign
      OIDC_CLIENT_SECRET: campaign-secret
      COMMUNICATION_BASE_URL: http://communication:8080
      INSIGHT_BASE_URL: http://insight:8080
      CATALOG_BASE_URL: http://product-catalog:8080
  flow:
    db: ""
    healthPath: /actuator/health
    extraEnv: {}
  porting:
    db: porting
    dbRole: porting_app
    extraEnv:
      PORTING_GATEWAY: mock
  policy:
    db: policy
    dbRole: policy_app
    extraEnv: {}
  knowledge:
    db: knowledge
    dbRole: knowledge_app
    extraEnv: {}
  insight:
    db: insight
    dbRole: insight_app
    # first-party profile + consent; decisioning via policy rules-as-data
    machineIdentity: true
    extraEnv:
      POLICY_BASE_URL: http://policy:8080
  quote:
    db: quote
    dbRole: quote_app
    machineIdentity: true
    extraEnv:
      OIDC_CLIENT_ID: bss-quote
      OIDC_CLIENT_SECRET: quote-secret
      SOM_BASE_URL: http://service-orchestration:8080
      CATALOG_BASE_URL: http://product-catalog:8080
      USAGE_BASE_URL: http://usage:8080
      ORDERING_BASE_URL: http://product-ordering:8080
      PORTING_BASE_URL: http://porting:8080
      INTELLIGENCE_BASE_URL: http://intelligence:8080
  intelligence:
    db: intelligence
    dbRole: intelligence_app
    machineIdentity: true
    extraEnv:
      AI_PROVIDER: stub
      OIDC_CLIENT_ID: bss-intelligence
      OIDC_CLIENT_SECRET: intelligence-secret
      AGREEMENT_BASE_URL: http://agreement:8080
      USAGE_BASE_URL: http://usage:8080
      TICKET_BASE_URL: http://trouble-ticket:8080
      ASSURANCE_BASE_URL: http://assurance:8080
      KNOWLEDGE_BASE_URL: http://knowledge:8080
      RECOMMENDATION_BASE_URL: http://recommendation:8080
      INSIGHT_BASE_URL: http://insight:8080
      INVENTORY_BASE_URL: http://product-inventory:8080
  user-roles:
    db: ""
    machineIdentity: true
    extraEnv:
      OIDC_CLIENT_ID: bss-user-admin
      OIDC_CLIENT_SECRET: user-admin-secret
  geographic-address:
    db: geographic_address
    dbRole: address_app
    extraEnv: {}
  document:
    db: document
    dbRole: document_app
    extraEnv: {}
  payment-method:
    db: payment_method
    dbRole: paymentmethod_app
    extraEnv: {}
  service-orchestration:
    db: service_om
    dbRole: som_app
    machineIdentity: true
    extraEnv:
      OIDC_CLIENT_ID: bss-som
      OIDC_CLIENT_SECRET: som-secret
      ORDERING_BASE_URL: http://product-ordering:8080
      PORTING_BASE_URL: http://porting:8080
      OCS_BASE_URL: http://mock-ocs:8080
  assurance:
    db: assurance
    dbRole: assurance_app
    machineIdentity: true
    extraEnv:
      OIDC_CLIENT_ID: bss-assurance
      OIDC_CLIENT_SECRET: assurance-secret
      SOM_BASE_URL: http://service-orchestration:8080
      TICKET_BASE_URL: http://trouble-ticket:8080
  recommendation:
    db: ""
    machineIdentity: true
    extraEnv:
      OIDC_CLIENT_ID: bss-recommendation
      OIDC_CLIENT_SECRET: recommendation-secret
      CATALOG_BASE_URL: http://product-catalog:8080
      INVENTORY_BASE_URL: http://product-inventory:8080
      INSIGHT_BASE_URL: http://insight:8080

# Edge exposure. Off by default (dev clusters port-forward the gateway).
# When enabled, an Ingress fronts the gateway — and the TLS guidance is
# post-quantum from day one: terminate with a HYBRID key exchange
# (X25519MLKEM768) so traffic recorded today cannot be decrypted by a
# future quantum machine ("harvest now, decrypt later"). The hybrid group
# is a CONTROLLER-level setting — see files/ingress-nginx-pqc.yaml for the
# ingress-nginx values that enable it; cloud L7 LBs (ALB, Front Door,
# Cloud LB) enable their equivalent per listener policy.
ingress:
  enabled: false
  className: nginx
  host: bss.example.com
  # Norwegian tenant hostnames ride the same listener
  extraHosts: []
  tls:
    enabled: true
    secretName: bss-edge-tls

# SIM PUK field encryption (AES-256-GCM at rest). REQUIRED in production:
# 32 bytes, base64 — source it from a KMS/secret store. Leaving it empty
# falls back to a fixed dev key that is loudly not for production.
pukKey: ""
