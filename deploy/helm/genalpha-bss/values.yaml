# Image source. The default expects images built locally by docker compose
# (repository prefix "bss-java-"). For a registry deployment set e.g.
#   image.prefix: ghcr.io/kundanvarma/genalpha-bss/
image:
  prefix: bss-java-
  tag: latest
  pullPolicy: IfNotPresent

replicas: 1

# Cross-cutting endpoints. Defaults target the in-cluster dependencies below;
# on EKS/AKS point these at RDS / Azure Database / MSK / Event Hubs / your IdP.
config:
  oidcIssuerUri: http://localhost:8085/realms/bss
  # Backchannel JWKS fetch; set empty when the issuer is directly reachable
  # from the pods (e.g. a real cloud IdP) to fall back to issuer discovery.
  oidcJwksUri: http://keycloak:8080/realms/bss/protocol/openid-connect/certs
  oidcTokenUri: http://keycloak:8080/realms/bss/protocol/openid-connect/token
  kafkaBootstrapServers: kafka:9092
  dbHost: postgres
  dbPort: "5432"
  dbUsername: postgres
  # Local/dev only. In cloud, use an existingSecret instead.
  dbPassword: postgres
  # Owner credentials for Flyway; the runtime uses each service's RLS-
  # restricted dbRole (dev convention: password == role name — override
  # per environment).
  dbMigrationUsername: postgres
  dbMigrationPassword: postgres
  # Second demo tenant (Nova Telecom). Remove or extend per deployment.
  novaIssuerUri: http://localhost:8085/realms/nova
  novaJwksUri: http://keycloak:8080/realms/nova/protocol/openid-connect/certs
  novaTokenUri: http://keycloak:8080/realms/nova/protocol/openid-connect/token

# In-cluster dependencies for local/dev clusters. Disable each on cloud.
local:
  postgres:
    enabled: true
    storage: 1Gi
  kafka:
    enabled: true
  keycloak:
    enabled: true
    frontendUrl: http://localhost:8085

resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    memory: 768Mi

# All application services and channel UIs. `db` names the per-service
# database (empty for stateless apps); `machineIdentity: true` injects the
# client-credentials token endpoint (services that call other services);
# `extraEnv` is appended verbatim.
services:
  gateway:
    db: ""
    extraEnv:
      CATALOG_URL: http://product-catalog:8080
      ORDERING_URL: http://product-ordering:8080
      INVENTORY_URL: http://product-inventory:8080
      PARTY_URL: http://party-account:8080
      STOCK_URL: http://product-stock:8080
      PAYMENT_URL: http://payment:8080
      BILLING_URL: http://billing:8080
      QUALIFICATION_URL: http://qualification:8080
      APPOINTMENT_URL: http://appointment:8080
      TICKET_URL: http://trouble-ticket:8080
      INTERACTION_URL: http://party-interaction:8080
      COMMUNICATION_URL: http://communication:8080
      CART_URL: http://shopping-cart:8080
      USAGE_URL: http://usage:8080
      AGREEMENT_URL: http://agreement:8080
      PROMOTION_URL: http://promotion:8080
      CONSOLE_URL: http://console:8080
      STOREFRONT_URL: http://storefront:8080
      CSR_URL: http://csr-console:8080
  console:
    db: ""
    healthPath: /healthz
    extraEnv: {}
  storefront:
    db: ""
    healthPath: /healthz
    extraEnv: {}
  csr-console:
    db: ""
    healthPath: /healthz
    extraEnv: {}
  product-catalog:
    db: product_catalog
    dbRole: catalog_app
    extraEnv: {}
  product-ordering:
    db: product_ordering
    dbRole: ordering_app
    machineIdentity: true
    extraEnv:
      CATALOG_BASE_URL: http://product-catalog:8080
      PARTY_BASE_URL: http://party-account:8080
      INVENTORY_BASE_URL: http://product-inventory:8080
      STOCK_BASE_URL: http://product-stock:8080
      PAYMENT_BASE_URL: http://payment:8080
      AGREEMENT_BASE_URL: http://agreement:8080
      PROMOTION_BASE_URL: http://promotion:8080
  product-inventory:
    db: product_inventory
    dbRole: inventory_app
    extraEnv: {}
  party-account:
    db: party_account
    dbRole: party_app
    extraEnv: {}
  product-stock:
    db: product_stock
    dbRole: stock_app
    extraEnv: {}
  payment:
    db: payment
    dbRole: payment_app
    extraEnv: {}
  billing:
    db: billing
    dbRole: billing_app
    machineIdentity: true
    extraEnv:
      OIDC_CLIENT_ID: bss-billing
      OIDC_CLIENT_SECRET: billing-secret
      INVENTORY_BASE_URL: http://product-inventory:8080
      CATALOG_BASE_URL: http://product-catalog:8080
      PAYMENT_BASE_URL: http://payment:8080
      USAGE_BASE_URL: http://usage:8080
      PROMOTION_BASE_URL: http://promotion:8080
  qualification:
    db: qualification
    dbRole: qualification_app
    extraEnv: {}
  appointment:
    db: appointment
    dbRole: appointment_app
    extraEnv: {}
  trouble-ticket:
    db: trouble_ticket
    dbRole: ticket_app
    extraEnv: {}
  party-interaction:
    db: party_interaction
    dbRole: interaction_app
    extraEnv: {}
  communication:
    db: communication
    dbRole: communication_app
    extraEnv: {}
  shopping-cart:
    db: shopping_cart
    dbRole: cart_app
    extraEnv: {}
  usage:
    db: usage
    dbRole: usage_app
    extraEnv: {}
  agreement:
    db: agreement
    dbRole: agreement_app
    extraEnv: {}
  promotion:
    db: promotion
    dbRole: promotion_app
    extraEnv: {}
