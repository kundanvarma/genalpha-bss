server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    location /healthz {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Console files are unhashed, so nothing here may be cached blindly —
    # browsers must revalidate or they keep running a stale app after deploys.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
