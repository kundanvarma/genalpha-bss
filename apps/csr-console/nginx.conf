server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    location /healthz {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Hashed bundles are immutable; index.html must always revalidate or
    # browsers keep serving a stale app after deploys.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
