      communication:
        condition: service_started
      shopping-cart:
        condition: service_started
      usage:
        condition: service_started
      agreement:
        condition: service_started
      promotion:
        condition: service_started
      user-roles:
        condition: service_started
      csr-console:
        condition: service_started
      console:
        condition: service_started
      storefront:
        condition: service_started

  console:
    build: ./apps/admin-console
    container_name: bss-console
    restart: unless-stopped

  csr-console:
    build: ./apps/csr-console
    container_name: bss-csr-console
    restart: unless-stopped

  storefront:
    build: ./apps/storefront
    container_name: bss-storefront
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: bss-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: bss-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres-data:

# Each service owns a private database, created by infra/postgres/init-databases.sql,
# and manages its own schema through Flyway migrations. Schema is applied at startup
# by Flyway; Hibernate runs with ddl-auto=validate and will refuse to start if the
# entities and the migrated schema disagree.
