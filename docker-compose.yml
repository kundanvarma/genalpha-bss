      appointment:
        condition: service_started
      trouble-ticket:
        condition: service_started
      party-interaction:
        condition: service_started
      communication:
        condition: service_started
      shopping-cart:
        condition: service_started
      usage:
        condition: service_started
      agreement:
        condition: service_started
      promotion:
        condition: service_started
      user-roles:
        condition: service_started
      geographic-address:
        condition: service_started
      document:
        condition: service_started
      recommendation:
        condition: service_started
      payment-method:
        condition: service_started
      service-orchestration:
        condition: service_started
      assurance:
        condition: service_started
      csr-console:
        condition: service_started
      console:
        condition: service_started
      storefront:
        condition: service_started
      mobile-app:
        condition: service_started

  # Stands in for the product-content system an operator already owns
  # (Akeneo/inRiver/DAM). Keyed by product NAME, knows nothing of this BSS.
  mock-pim:
    build: ./integrations/mock-pim
    container_name: bss-mock-pim
    restart: unless-stopped

  # Stands in for the operator's Online Charging System: rate plans,
  # subscriber buckets, rollover. The SOM provisions here at activation;
  # TMF654 projects balances from here. Port 8115 for the E2E's simulated
  # network usage.
  mock-ocs:
    build: ./integrations/mock-ocs
    container_name: bss-mock-ocs
    restart: unless-stopped
    ports:
      - "8115:8080"

  console:
    build: ./apps/admin-console
    container_name: bss-console
    restart: unless-stopped

  business-console:
    build: ./apps/business-console
    container_name: bss-business-console
    restart: unless-stopped

  mobile-app:
    build: ./apps/mobile
    container_name: bss-mobile-app
    restart: unless-stopped

  csr-console:
    build: ./apps/csr-console
    container_name: bss-csr-console
    restart: unless-stopped

  storefront:
    build: ./apps/storefront
    container_name: bss-storefront
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: bss-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: bss-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  ollama-models:
  postgres-data:

# Each service owns a private database, created by infra/postgres/init-databases.sql,
# and manages its own schema through Flyway migrations. Schema is applied at startup
# by Flyway; Hibernate runs with ddl-auto=validate and will refuse to start if the
# entities and the migrated schema disagree.
