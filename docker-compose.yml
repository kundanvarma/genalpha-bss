services:
  postgres:
    image: postgres:16-alpine
    container_name: bss-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bss
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  product-catalog:
    build: ./services/product-catalog
    container_name: bss-product-catalog
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bss
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  product-ordering:
    build: ./services/product-ordering
    container_name: bss-product-ordering
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bss
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy

  product-inventory:
    build: ./services/product-inventory
    container_name: bss-product-inventory
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bss
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy

  party-account:
    build: ./services/party-account
    container_name: bss-party-account
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bss
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy

# All four services share one Postgres database "bss"; their table names are
# distinct per TMF resource, so there are no collisions. Each service creates
# its own schema via JPA ddl-auto=update on startup.
