services:
  postgres:
    image: postgres:16-alpine
    container_name: bss-postgres
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=300"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/10-init-databases.sql:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    # Official Apache image; the bitnami/kafka images were withdrawn from
    # Docker Hub in 2025.
    image: apache/kafka:3.9.0
    container_name: bss-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: bss-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Browsers must reach every interactive URL on localhost:8085, so that is
      # the pinned frontend hostname (and the token issuer). Backchannel-dynamic
      # lets in-network callers (JWKS fetch, client-credentials) keep using
      # keycloak:8080.
      KC_HOSTNAME: http://localhost:8085
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    ports:
      - "8085:8080"
    volumes:
      - ./infra/keycloak/bss-realm.json:/opt/keycloak/data/import/bss-realm.json:ro
      - ./infra/keycloak/nova-realm.json:/opt/keycloak/data/import/nova-realm.json:ro

  product-catalog:
    build: ./services/product-catalog
    container_name: bss-product-catalog
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/product_catalog
      # Runtime role is RLS-restricted; Flyway migrates as the owner.
      DB_USERNAME: catalog_app
      DB_PASSWORD: catalog_app
      DB_MIGRATION_USERNAME: postgres
      DB_MIGRATION_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      OIDC_ISSUER_URI: http://localhost:8085/realms/bss
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/bss/protocol/openid-connect/certs
      OIDC_JWKS_URI_NOVA: http://keycloak:8080/realms/nova/protocol/openid-connect/certs
      # nova brings its own PIM — genalpha stays on the internal document store
      PIM_BASE_URL_NOVA: http://mock-pim:8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      # 21 JVMs share one VM: bounded heap beats the 75%-of-RAM default.
      JAVA_OPTS: "-Xmx224m -XX:MaxMetaspaceSize=128m"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_started

