services:
  postgres:
    image: postgres:16-alpine
    container_name: bss-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/10-init-databases.sql:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    # Official Apache image; the bitnami/kafka images were withdrawn from
    # Docker Hub in 2025.
    image: apache/kafka:3.9.0
    container_name: bss-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: bss-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Fixed hostname so tokens minted via localhost:8085 carry the same issuer
      # (http://keycloak:8080/realms/bss) that the services validate against.
      KC_HOSTNAME: http://keycloak:8080
    ports:
      - "8085:8080"
    volumes:
      - ./infra/keycloak/bss-realm.json:/opt/keycloak/data/import/bss-realm.json:ro

  product-catalog:
    build: ./services/product-catalog
    container_name: bss-product-catalog
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/product_catalog
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      OIDC_ISSUER_URI: http://keycloak:8080/realms/bss
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_started

  product-ordering:
    build: ./services/product-ordering
    container_name: bss-product-ordering
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/product_ordering
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      OIDC_ISSUER_URI: http://keycloak:8080/realms/bss
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OIDC_TOKEN_URI: http://keycloak:8080/realms/bss/protocol/openid-connect/token
      CATALOG_BASE_URL: http://product-catalog:8080
      PARTY_BASE_URL: http://party-account:8080
      INVENTORY_BASE_URL: http://product-inventory:8080
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_started
      product-catalog:
        condition: service_started
      product-inventory:
        condition: service_started
      party-account:
        condition: service_started

  product-inventory:
    build: ./services/product-inventory
    container_name: bss-product-inventory
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/product_inventory
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      OIDC_ISSUER_URI: http://keycloak:8080/realms/bss
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_started

  party-account:
    build: ./services/party-account
    container_name: bss-party-account
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/party_account
      DB_USERNAME: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      OIDC_ISSUER_URI: http://keycloak:8080/realms/bss
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_started

  gateway:
    build: ./services/gateway
    container_name: bss-gateway
    environment:
      CATALOG_URL: http://product-catalog:8080
      ORDERING_URL: http://product-ordering:8080
      INVENTORY_URL: http://product-inventory:8080
      PARTY_URL: http://party-account:8080
    ports:
      - "8080:8080"
    depends_on:
      product-catalog:
        condition: service_started
      product-ordering:
        condition: service_started
      product-inventory:
        condition: service_started
      party-account:
        condition: service_started

volumes:
  postgres-data:

# Each service owns a private database, created by infra/postgres/init-databases.sql,
# and manages its own schema through Flyway migrations. Schema is applied at startup
# by Flyway; Hibernate runs with ddl-auto=validate and will refuse to start if the
# entities and the migrated schema disagree.
