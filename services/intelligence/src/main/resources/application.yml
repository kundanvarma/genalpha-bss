spring:
  application:
    name: intelligence
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      properties:
        max.block.ms: 2000
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/intelligence}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-{vendor}
    # Complete standalone connection: migrations run as the OWNING role
    # (RLS does not bind owners), never through the tenant-aware wrapper.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/intelligence}
    user: ${DB_MIGRATION_USERNAME:${DB_USERNAME:postgres}}
    password: ${DB_MIGRATION_PASSWORD:${DB_PASSWORD:postgres}}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

bss:
  events:
    topic: bss.intelligence.events
  downstream:
    catalog-base-url: ${CATALOG_BASE_URL:http://localhost:8081}
    billing-base-url: ${BILLING_BASE_URL:http://localhost:8088}
    agreement-base-url: ${AGREEMENT_BASE_URL:http://localhost:8098}
    usage-base-url: ${USAGE_BASE_URL:http://localhost:8097}
    ticket-base-url: ${TICKET_BASE_URL:http://localhost:8092}
    assurance-base-url: ${ASSURANCE_BASE_URL:http://localhost:8105}
    knowledge-base-url: ${KNOWLEDGE_BASE_URL:http://localhost:8118}
    recommendation-base-url: ${RECOMMENDATION_BASE_URL:http://localhost:8102}
    insight-base-url: ${INSIGHT_BASE_URL:http://localhost:8119}
    inventory-base-url: ${INVENTORY_BASE_URL:http://localhost:8083}
  intelligence:
    churn:
      # Structured rules, not a model: commitment ending within N days;
      # any meter at or past this share of its allowance.
      agreement-days: ${CHURN_AGREEMENT_DAYS:30}
      usage-threshold: ${CHURN_USAGE_THRESHOLD:0.9}
      ticket-threshold: ${CHURN_TICKET_THRESHOLD:2}
      predict-threshold: ${CHURN_PREDICT_THRESHOLD:0.7}
      interval-ms: ${CHURN_INTERVAL_MS:300000}
    # The vendor seam. "stub" is deterministic and needs no network or keys —
    # the stack and its E2E suites run AI features out of the box. Point at a
    # real model per deployment (or per tenant, later) via:
    #   provider: openai-compatible   base-url: http://ollama:11434  model: llama3.2
    #   provider: openai-compatible   base-url: https://api.openai.com  api-key: ...
    #   provider: anthropic           api-key: ...  model: claude-haiku-4-5-20251001
    provider: ${AI_PROVIDER:stub}
    base-url: ${AI_BASE_URL:}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:}
  # Issuer-per-tenant: each entry is a trusted OIDC issuer that IS a tenant.
  tenants:
    default-tenant: genalpha
    registry:
      - id: genalpha
        issuer: ${OIDC_ISSUER_URI:http://localhost:8085/realms/bss}
        jwks-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:}
        token-uri: ${OIDC_TOKEN_URI:http://localhost:8085/realms/bss/protocol/openid-connect/token}
        machine-client-id: ${OIDC_CLIENT_ID:bss-intelligence}
        machine-client-secret: ${OIDC_CLIENT_SECRET:intelligence-secret}
        market-feed-url: ${MARKET_FEED_URL:}
        market-feed-token: ${MARKET_FEED_TOKEN:}
        ai-model-fast: ${AI_MODEL_FAST:}
        ai-model-smart: ${AI_MODEL_SMART:}
      - id: nova
        issuer: ${OIDC_ISSUER_URI_NOVA:http://localhost:8085/realms/nova}
        jwks-uri: ${OIDC_JWKS_URI_NOVA:}
        token-uri: ${OIDC_TOKEN_URI_NOVA:http://localhost:8085/realms/nova/protocol/openid-connect/token}
        machine-client-id: ${OIDC_CLIENT_ID:bss-intelligence}
        machine-client-secret: ${OIDC_CLIENT_SECRET:intelligence-secret}
        market-feed-url: ${MARKET_FEED_URL_NOVA:}
        market-feed-token: ${MARKET_FEED_TOKEN_NOVA:}
        ai-model-fast: ${AI_MODEL_FAST_NOVA:}
        ai-model-smart: ${AI_MODEL_SMART_NOVA:}
        # Per-tenant AI stack (optional): unset falls back to bss.intelligence.*
        ai-provider: ${AI_PROVIDER_NOVA:}
        ai-base-url: ${AI_BASE_URL_NOVA:}
        ai-api-key: ${AI_API_KEY_NOVA:}
        ai-model: ${AI_MODEL_NOVA:}
