spring:
  application:
    name: product-ordering
  security:
    oauth2:
      client:
        registration:
          bss-m2m:
            client-id: ${OIDC_CLIENT_ID:bss-ordering}
            client-secret: ${OIDC_CLIENT_SECRET:ordering-secret}
            authorization-grant-type: client_credentials
            provider: bss
        provider:
          bss:
            # token-uri directly (not issuer discovery): the client registration
            # must not require the IdP to be reachable at startup.
            token-uri: ${OIDC_TOKEN_URI:http://localhost:8085/realms/bss/protocol/openid-connect/token}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/product_ordering}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      properties:
        max.block.ms: 2000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

bss:
  events:
    topic: bss.ordering.events
  # Issuer-per-tenant: each entry is a trusted OIDC issuer that IS a tenant.
  # jwks-uri is the backchannel key endpoint (dev: keycloak's split hostname);
  # leave it empty when the issuer is directly reachable for discovery.
  tenants:
    default-tenant: genalpha
    registry:
      - id: genalpha
        issuer: ${OIDC_ISSUER_URI:http://localhost:8085/realms/bss}
        jwks-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:}
  stock:
    enabled: ${STOCK_ENABLED:true}
  payment:
    enabled: ${PAYMENT_ENABLED:true}
  downstream:
    catalog-base-url: ${CATALOG_BASE_URL:http://localhost:8081}
    party-base-url: ${PARTY_BASE_URL:http://localhost:8084}
    inventory-base-url: ${INVENTORY_BASE_URL:http://localhost:8083}
    stock-base-url: ${STOCK_BASE_URL:http://localhost:8086}
    payment-base-url: ${PAYMENT_BASE_URL:http://localhost:8087}
