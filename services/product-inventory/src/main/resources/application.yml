spring:
  application:
    name: product-inventory
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/product_inventory}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      properties:
        max.block.ms: 2000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

bss:
  events:
    topic: bss.inventory.events
  # Issuer-per-tenant: each entry is a trusted OIDC issuer that IS a tenant.
  # jwks-uri is the backchannel key endpoint (dev: keycloak's split hostname);
  # leave it empty when the issuer is directly reachable for discovery.
  tenants:
    default-tenant: genalpha
    registry:
      - id: genalpha
        issuer: ${OIDC_ISSUER_URI:http://localhost:8085/realms/bss}
        jwks-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:}
