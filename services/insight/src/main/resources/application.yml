spring:
  application:
    name: insight
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/insight}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      properties:
        max.block.ms: 2000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-{vendor}
    # Complete standalone connection: migrations run as the OWNING role
    # (RLS does not bind owners), never through the tenant-aware wrapper.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/insight}
    user: ${DB_MIGRATION_USERNAME:${DB_USERNAME:postgres}}
    password: ${DB_MIGRATION_PASSWORD:${DB_PASSWORD:postgres}}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

bss:
  events:
    topic: bss.insight.events
  # Issuer-per-tenant: each entry is a trusted OIDC issuer that IS a tenant.
  # jwks-uri is the backchannel key endpoint (dev: keycloak's split hostname);
  # leave it empty when the issuer is directly reachable for discovery.
  downstream:
    # experience rules authored as data live in the policy component
    policy-base-url: ${POLICY_BASE_URL:http://localhost:8113}
  tenants:
    default-tenant: genalpha
    registry:
      - id: genalpha
        issuer: ${OIDC_ISSUER_URI:http://localhost:8085/realms/bss}
        jwks-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:}
        token-uri: ${OIDC_TOKEN_URI:http://localhost:8085/realms/bss/protocol/openid-connect/token}
        machine-client-id: ${OIDC_CLIENT_ID:bss-insight}
        machine-client-secret: ${OIDC_CLIENT_SECRET:insight-secret}
        analytics-provider: ${ANALYTICS_PROVIDER:internal}
        analytics-mp-url: ${ANALYTICS_MP_URL:https://www.google-analytics.com}
        analytics-measurement-id: ${ANALYTICS_MEASUREMENT_ID:}
        analytics-api-secret: ${ANALYTICS_API_SECRET:}
      - id: nova
        issuer: ${OIDC_ISSUER_URI_NOVA:http://localhost:8085/realms/nova}
        jwks-uri: ${OIDC_JWKS_URI_NOVA:}
        token-uri: ${OIDC_TOKEN_URI_NOVA:http://localhost:8085/realms/nova/protocol/openid-connect/token}
        machine-client-id: ${OIDC_CLIENT_ID:bss-insight}
        machine-client-secret: ${OIDC_CLIENT_SECRET:insight-secret}
        analytics-provider: ${ANALYTICS_PROVIDER_NOVA:internal}
        analytics-mp-url: ${ANALYTICS_MP_URL_NOVA:https://www.google-analytics.com}
        analytics-measurement-id: ${ANALYTICS_MEASUREMENT_ID_NOVA:}
        analytics-api-secret: ${ANALYTICS_API_SECRET_NOVA:}
