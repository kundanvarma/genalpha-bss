spring:
  application:
    name: porting
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/porting}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      properties:
        max.block.ms: 2000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/migration-{vendor}
    # Complete standalone connection: migrations run as the OWNING role
    # (RLS does not bind owners), never through the tenant-aware wrapper.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/porting}
    user: ${DB_MIGRATION_USERNAME:${DB_USERNAME:postgres}}
    password: ${DB_MIGRATION_PASSWORD:${DB_PASSWORD:postgres}}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

bss:
  events:
    topic: bss.porting.events
  porting:
    # The clearinghouse regime: 'mock' (dev, rules applied but no external body)
    # or 'nrdb' (Norway — Nasjonal Referansedatabase). Overridable per tenant/
    # country; a real deployment implements the adapter against the clearinghouse.
    gateway: ${PORTING_GATEWAY:mock}
    # Dev cutover compression: complete scheduled ports N seconds after request
    # (0 = off; production waits for the clearinghouse's agreed window).
    auto-complete-seconds: ${PORTING_AUTO_COMPLETE_SECONDS:0}
  # Issuer-per-tenant: each entry is a trusted OIDC issuer that IS a tenant.
  # jwks-uri is the backchannel key endpoint (dev: keycloak's split hostname);
  # leave it empty when the issuer is directly reachable for discovery.
  tenants:
    default-tenant: genalpha
    registry:
      - id: genalpha
        issuer: ${OIDC_ISSUER_URI:http://localhost:8085/realms/bss}
        jwks-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:}
      - id: nova
        issuer: ${OIDC_ISSUER_URI_NOVA:http://localhost:8085/realms/nova}
        jwks-uri: ${OIDC_JWKS_URI_NOVA:}
