            - Path=/tmf-api/paymentMethods/**
        - id: service-orchestration
          uri: ${SOM_URL:http://localhost:8104}
          predicates:
            - Path=/tmf-api/serviceOrdering/**,/tmf-api/serviceInventory/**,/tmf-api/resourcePoolManagement/**,/tmf-api/intentManagement/**
        - id: assurance
          uri: ${ASSURANCE_URL:http://localhost:8105}
          predicates:
            - Path=/tmf-api/alarmManagement/**,/tmf-api/serviceProblemManagement/**
        - id: csr-console
          uri: ${CSR_URL:http://localhost:8094}
          predicates:
            - Path=/csr/**
          filters:
            - StripPrefix=1
        - id: admin-console
          uri: ${CONSOLE_URL:http://localhost:8090}
          predicates:
            - Path=/console/**
          filters:
            - StripPrefix=1
        - id: business-console
          uri: ${BIZ_URL:http://localhost:8094}
          predicates:
            - Path=/biz/**
          filters:
            - StripPrefix=1
        - id: storefront
          uri: ${STOREFRONT_URL:http://localhost:8091}
          predicates:
            - Path=/shop/**
          filters:
            - StripPrefix=1
        - id: mobile-app
          uri: ${APP_URL:http://localhost:8107}
          predicates:
            - Path=/app/**
          filters:
            - StripPrefix=1
        # An operator's external PIM: its media hrefs are gateway-relative
        # (/pim/assets/...) so the browser fetches product art through the
        # same front door as everything else.
        - id: pim
          uri: ${PIM_URL:http://localhost:8114}
          predicates:
            - Path=/pim/**
          filters:
            - StripPrefix=1

server:
  port: 8080

bss:
  # White-label host map: anonymous traffic on these hostnames belongs to
  # these tenants (X-Tenant-Id stamped by TenantHostFilter); the issuer feeds
  # /shop/tenant-config.js so one storefront build logs in per tenant.
  # *.localhost resolves to 127.0.0.1 in browsers — no DNS needed for dev.
  tenants:
    default-tenant: genalpha
    registry:
      - id: genalpha
        issuer: ${OIDC_ISSUER_URI:http://localhost:8085/realms/bss}
        brand-name: MyGenAlpha
        brand-color: "#0E7C7B"
        locale: en
        currency: EUR
        hosts: [localhost, 127.0.0.1, shop.genalpha.localhost]
      - id: nova
        issuer: ${OIDC_ISSUER_URI_NOVA:http://localhost:8085/realms/nova}
        brand-name: MyNova
        brand-color: "#5B3FA8"
        locale: "no"
        currency: NOK
        hosts: [shop.nova.localhost, csr.nova.localhost, console.nova.localhost, biz.nova.localhost]

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}
