spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: product-catalog
          uri: ${CATALOG_URL:http://localhost:8081}
          predicates:
            - Path=/tmf-api/productCatalogManagement/**
        - id: product-ordering
          uri: ${ORDERING_URL:http://localhost:8082}
          predicates:
            - Path=/tmf-api/productOrderingManagement/**
        - id: product-inventory
          uri: ${INVENTORY_URL:http://localhost:8083}
          predicates:
            - Path=/tmf-api/productInventory/**
        - id: party-account
          uri: ${PARTY_URL:http://localhost:8084}
          predicates:
            - Path=/tmf-api/party/**,/tmf-api/accountManagement/**,/tmf-api/partyRoleManagement/**
        - id: product-stock
          uri: ${STOCK_URL:http://localhost:8086}
          predicates:
            - Path=/tmf-api/productStockManagement/**
        - id: payment
          uri: ${PAYMENT_URL:http://localhost:8087}
          predicates:
            - Path=/tmf-api/paymentManagement/**
        - id: billing
          uri: ${BILLING_URL:http://localhost:8088}
          predicates:
            - Path=/tmf-api/customerBillManagement/**
        - id: qualification
          uri: ${QUALIFICATION_URL:http://localhost:8089}
          predicates:
            - Path=/tmf-api/productOfferingQualification/**
        - id: appointment
          uri: ${APPOINTMENT_URL:http://localhost:8091}
          predicates:
            - Path=/tmf-api/appointment/**
        - id: trouble-ticket
          uri: ${TICKET_URL:http://localhost:8092}
          predicates:
            - Path=/tmf-api/troubleTicket/**
        - id: party-interaction
          uri: ${INTERACTION_URL:http://localhost:8093}
          predicates:
            - Path=/tmf-api/partyInteraction/**
        - id: communication
          uri: ${COMMUNICATION_URL:http://localhost:8095}
          predicates:
            - Path=/tmf-api/communicationManagement/**
        - id: shopping-cart
          uri: ${CART_URL:http://localhost:8096}
          predicates:
            - Path=/tmf-api/shoppingCart/**
        - id: usage
          uri: ${USAGE_URL:http://localhost:8097}
          predicates:
            - Path=/tmf-api/usageManagement/**,/tmf-api/usageConsumption/**
        - id: agreement
          uri: ${AGREEMENT_URL:http://localhost:8098}
          predicates:
            - Path=/tmf-api/agreementManagement/**
        - id: promotion
          uri: ${PROMOTION_URL:http://localhost:8099}
          predicates:
            - Path=/tmf-api/promotionManagement/**
        - id: user-roles
          uri: ${USER_ROLES_URL:http://localhost:8100}
          predicates:
            - Path=/tmf-api/rolesAndPermissionsManagement/**
        - id: geographic-address
          uri: ${ADDRESS_URL:http://localhost:8101}
          predicates:
            - Path=/tmf-api/geographicAddressManagement/**
        - id: recommendation
          uri: ${RECOMMENDATION_URL:http://localhost:8102}
          predicates:
            - Path=/tmf-api/recommendationManagement/**
        - id: payment-method
          uri: ${PAYMENT_METHOD_URL:http://localhost:8103}
          predicates:
            - Path=/tmf-api/paymentMethods/**
        - id: service-orchestration
          uri: ${SOM_URL:http://localhost:8104}
          predicates:
            - Path=/tmf-api/serviceOrdering/**,/tmf-api/serviceInventory/**
        - id: assurance
          uri: ${ASSURANCE_URL:http://localhost:8105}
          predicates:
            - Path=/tmf-api/alarmManagement/**,/tmf-api/serviceProblemManagement/**
        - id: csr-console
          uri: ${CSR_URL:http://localhost:8094}
          predicates:
            - Path=/csr/**
          filters:
            - StripPrefix=1
        - id: admin-console
          uri: ${CONSOLE_URL:http://localhost:8090}
          predicates:
            - Path=/console/**
          filters:
            - StripPrefix=1
        - id: storefront
          uri: ${STOREFRONT_URL:http://localhost:8091}
          predicates:
            - Path=/shop/**
          filters:
            - StripPrefix=1

server:
  port: 8080

bss:
  # White-label host map: anonymous traffic on these hostnames belongs to
  # these tenants (X-Tenant-Id stamped by TenantHostFilter); the issuer feeds
  # /shop/tenant-config.js so one storefront build logs in per tenant.
  # *.localhost resolves to 127.0.0.1 in browsers — no DNS needed for dev.
  tenants:
    default-tenant: genalpha
    registry:
      - id: genalpha
        issuer: ${OIDC_ISSUER_URI:http://localhost:8085/realms/bss}
        hosts: [localhost, 127.0.0.1, shop.genalpha.localhost]
      - id: nova
        issuer: ${OIDC_ISSUER_URI_NOVA:http://localhost:8085/realms/nova}
        hosts: [shop.nova.localhost, csr.nova.localhost, console.nova.localhost]

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}
