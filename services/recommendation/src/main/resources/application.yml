spring:
  application:
    name: recommendation

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

bss:
  recommendation:
    # The learning seam: 'rules' (bundles first, catalog order) or
    # 'popularity' (bundles first, then tenant-wide adoption). A trained
    # model is a third implementation of the same Ranker interface.
    ranker: ${RECOMMENDATION_RANKER:popularity}
  downstream:
    catalog-base-url: ${CATALOG_BASE_URL:http://localhost:8081}
    inventory-base-url: ${INVENTORY_BASE_URL:http://localhost:8083}
  tenants:
    default-tenant: genalpha
    registry:
      - id: genalpha
        issuer: ${OIDC_ISSUER_URI:http://localhost:8085/realms/bss}
        jwks-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:}
        token-uri: ${OIDC_TOKEN_URI:http://localhost:8085/realms/bss/protocol/openid-connect/token}
        machine-client-id: ${OIDC_CLIENT_ID:bss-recommendation}
        machine-client-secret: ${OIDC_CLIENT_SECRET:recommendation-secret}
      - id: nova
        issuer: ${OIDC_ISSUER_URI_NOVA:http://localhost:8085/realms/nova}
        jwks-uri: ${OIDC_JWKS_URI_NOVA:}
        token-uri: ${OIDC_TOKEN_URI_NOVA:http://localhost:8085/realms/nova/protocol/openid-connect/token}
        machine-client-id: ${OIDC_CLIENT_ID:bss-recommendation}
        machine-client-secret: ${OIDC_CLIENT_SECRET:recommendation-secret}