# THE TENANT FLEET AS A FILE — mounted read-only into every service at
# /config/tenants.yml (SPRING_CONFIG_IMPORT). Onboarding a new operator =
# append a block + restart the fleet. No rebuild. This is the UNION of
# every service's per-tenant fields: binding ignores fields a service
# does not know, and ${ENV:default} placeholders resolve per container
# (machine identities ride OIDC_CLIENT_ID/SECRET env set in compose).
bss:
  tenants:
    default-tenant: genalpha
    registry:
      - id: genalpha
        issuer: ${OIDC_ISSUER_URI:http://localhost:8085/realms/bss}
        jwks-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:}
        token-uri: ${OIDC_TOKEN_URI:http://localhost:8085/realms/bss/protocol/openid-connect/token}
        machine-client-id: ${OIDC_CLIENT_ID:bss-assurance}
        machine-client-secret: ${OIDC_CLIENT_SECRET:assurance-secret}
        bill-distribution-provider: ${BILL_DISTRIBUTION_PROVIDER:none}
        bill-distribution-url: ${BILL_DISTRIBUTION_URL:}
        bill-distribution-token: ${BILL_DISTRIBUTION_TOKEN:}
        bill-distribution-format: ${BILL_DISTRIBUTION_FORMAT:peppol}
        bill-distribution-channel: ${BILL_DISTRIBUTION_CHANNEL:einvoice}
        bank-token: ${BANK_TOKEN:}
        social-api-url: ${SOCIAL_API_URL:}
        social-access-token: ${SOCIAL_ACCESS_TOKEN:}
        delivery-provider: ${DELIVERY_PROVIDER:internal}
        esp-url: ${ESP_URL:}
        esp-api-key: ${ESP_API_KEY:}
        esp-from: ${ESP_FROM:}
        brand-name: MyGenAlpha
        brand-color: "#0E7C7B"
        locale: en
        currency: EUR
        hosts: [localhost, 127.0.0.1, shop.genalpha.localhost]
        analytics-provider: ${ANALYTICS_PROVIDER:internal}
        analytics-mp-url: ${ANALYTICS_MP_URL:https://www.google-analytics.com}
        analytics-measurement-id: ${ANALYTICS_MEASUREMENT_ID:}
        analytics-api-secret: ${ANALYTICS_API_SECRET:}
        analytics-data-url: ${ANALYTICS_DATA_URL:}
        analytics-property-id: ${ANALYTICS_PROPERTY_ID:}
        analytics-data-token: ${ANALYTICS_DATA_TOKEN:}
        pim-base-url: ${PIM_BASE_URL:}
        social-lead-form-id: ${SOCIAL_LEAD_FORM_ID:}
